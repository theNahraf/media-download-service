<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalable Media Downloader</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #eab308;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input[type="url"], select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="url"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background-color: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        /* Status Area */
        .status-container {
            margin-top: 30px;
            background-color: #0d1323;
            border-radius: 12px;
            padding: 24px;
            display: none;
            text-align: left;
            border: 1px solid var(--border);
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.pending { background: #334155; color: #cbd5e1; }
        .badge.processing { background: #1e3a8a; color: #93c5fd; }
        .badge.uploading { background: #7e22ce; color: #d8b4fe; }
        .badge.completed { background: #14532d; color: #86efac; }
        .badge.failed { background: #7f1d1d; color: #fca5a5; }

        .progress-block {
            margin-bottom: 15px;
        }

        .progress-bar-bg {
            height: 8px;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .thumbnail {
            width: 100px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
            background-color: #334155;
        }

        .meta-info h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta-info span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .download-btn {
            background-color: var(--success);
            text-decoration: none;
            display: block;
            text-align: center;
            padding: 14px;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            display: none;
        }

        .download-btn:hover {
            background-color: #16a34a;
        }
        
        #error-msg {
            color: var(--error);
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Media Downloader</h1>
    <p class="subtitle">Scalable, async YouTube downloads</p>

    <div class="form-group">
        <label for="url">Video URL</label>
        <input type="url" id="url" placeholder="https://www.youtube.com/watch?v=..." required />
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label for="format">Format</label>
            <select id="format">
                <option value="video">Video (MP4)</option>
                <option value="audio">Audio (MP3)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="quality">Quality</label>
            <select id="quality">
                <option value="best">Best Available</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
                <option value="480p">480p</option>
            </select>
        </div>
    </div>

    <button id="submitBtn" onclick="submitJob()">Start Download</button>
    <div id="error-msg"></div>

    <!-- Status Tracker -->
    <div class="status-container" id="statusBox">
        
        <div class="video-meta" id="videoMeta" style="display: none;">
            <img src="" alt="Thumbnail" class="thumbnail" id="thumbImg">
            <div class="meta-info">
                <h4 id="videoTitle">Loading details...</h4>
                <span id="videoDuration"></span>
            </div>
        </div>

        <div class="status-header">
            <span style="font-size: 14px; font-weight: 600; color: var(--text-muted);">Status</span>
            <span class="badge pending" id="statusBadge">PENDING</span>
        </div>

        <div class="progress-block" id="progressBlock">
            <div style="display: flex; justify-content: space-between; font-size: 13px;">
                <span id="progressText">Checking dedup cache / adding to queue...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <p id="jobError" style="color: var(--error); font-size: 13px; display: none; margin-top: 10px;"></p>

        <a href="#" class="download-btn" id="downloadBtn" target="_blank">Download File</a>
    </div>
</div>

<script>
    let pollInterval = null;

    async function submitJob() {
        const urlInput = document.getElementById("url").value;
        const formatInput = document.getElementById("format").value;
        const qualityInput = document.getElementById("quality").value;
        const btn = document.getElementById("submitBtn");
        const errorMsg = document.getElementById("error-msg");
        const statusBox = document.getElementById("statusBox");
        const downloadBtn = document.getElementById("downloadBtn");
        
        if (!urlInput) {
            showError("Please enter a valid URL");
            return;
        }

        // Reset UI
        btn.disabled = true;
        btn.innerText = "Submitting...";
        errorMsg.style.display = "none";
        statusBox.style.display = "block";
        downloadBtn.style.display = "none";
        document.getElementById("progressBlock").style.display = "block";
        document.getElementById("jobError").style.display = "none";
        document.getElementById("progressBar").style.width = "0%";
        document.getElementById("progressPercent").innerText = "0%";
        updateBadge("PENDING");
        document.getElementById("progressText").innerText = "Submitting to API...";
        document.getElementById("videoMeta").style.display = "none";

        if (pollInterval) clearInterval(pollInterval);

        try {
            const res = await fetch("/api/v1/jobs", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    url: urlInput,
                    format: formatInput,
                    quality: qualityInput
                })
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.detail || data.error || "Failed to create job");
            }

            // Job created, start polling
            startPolling(data.job_id);

        } catch (err) {
            showError(err.message);
            statusBox.style.display = "none";
            btn.disabled = false;
            btn.innerText = "Start Download";
        }
    }

    function startPolling(jobId) {
        document.getElementById("progressText").innerText = "Waiting in queue...";
        
        pollInterval = setInterval(async () => {
            try {
                const res = await fetch(`/api/v1/jobs/${jobId}`);
                if (!res.ok) throw new Error("Failed to fetch status");
                
                const data = await res.json();
                updateUI(data);

                // Stop polling if terminal state
                if (["completed", "failed", "cancelled", "expired"].includes(data.status)) {
                    clearInterval(pollInterval);
                    document.getElementById("submitBtn").disabled = false;
                    document.getElementById("submitBtn").innerText = "Start New Download";
                }

            } catch (err) {
                console.error("Polling error:", err);
            }
        }, 3000); // poll every 3 seconds
    }

    function updateUI(data) {
        updateBadge(data.status);

        // Update progress bar
        let percent = data.progress || 0;
        if (data.status === "completed") percent = 100;
        
        document.getElementById("progressBar").style.width = `${percent}%`;
        document.getElementById("progressPercent").innerText = `${percent}%`;

        // Update text
        const pt = document.getElementById("progressText");
        if (data.status === "pending") pt.innerText = "Waiting in queue...";
        if (data.status === "processing") pt.innerText = `Downloading from YouTube...`;
        if (data.status === "uploading") pt.innerText = "Uploading to Cloud Storage...";
        if (data.status === "completed") pt.innerText = "Ready!";
        
        // Show metadata if available
        if (data.title) {
            document.getElementById("videoMeta").style.display = "flex";
            document.getElementById("videoTitle").innerText = data.title;
            
            if (data.thumbnail_url) {
                document.getElementById("thumbImg").src = data.thumbnail_url;
            }
            
            if (data.duration_seconds) {
                const mins = Math.floor(data.duration_seconds / 60);
                const secs = data.duration_seconds % 60;
                let sizeText = data.file_size_bytes ? ` • ${(data.file_size_bytes / (1024*1024)).toFixed(1)} MB` : "";
                document.getElementById("videoDuration").innerText = `${mins}:${secs.toString().padStart(2, '0')}${sizeText}`;
            }
        }

        // Handle states
        if (data.status === "completed" && data.download_url) {
            document.getElementById("progressBlock").style.display = "none";
            const btn = document.getElementById("downloadBtn");
            btn.href = data.download_url;
            btn.style.display = "block";
        }

        if (data.status === "failed") {
            const errEl = document.getElementById("jobError");
            errEl.innerText = `Failed: ${data.error_message || "Unknown error"}`;
            errEl.style.display = "block";
            document.getElementById("progressBlock").style.display = "none";
        }
    }

    function updateBadge(status) {
        const badge = document.getElementById("statusBadge");
        badge.innerText = status.toUpperCase();
        badge.className = `badge ${status.toLowerCase()}`;
    }

    function showError(msg) {
        const errEl = document.getElementById("error-msg");
        errEl.innerText = msg;
        errEl.style.display = "block";
    }
</script>
</body>
</html>
