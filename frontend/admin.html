<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS reset and nice styles */
        :root {
            --bg-color: #050505;
            --container-bg: rgba(15, 23, 42, 0.6);
            --primary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            background: var(--container-bg);
            backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 1100px;
        }
        h1 { margin-top: 0; }
        
        .login-box { max-width: 400px; margin: 0 auto; text-align: center; }
        input {
            width: 100%; padding: 16px; border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-main); font-family: 'Outfit';
            margin-bottom: 16px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; font-weight: bold; cursor: pointer;
        }
        
        /* Dashboard Layout */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .metric-card h3 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 14px; text-transform: uppercase; }
        .metric-card p { margin: 0; font-size: 32px; font-weight: 800; color: var(--text-main); }
        .metric-card p span.sub { font-size: 14px; color: var(--text-muted); font-weight: 500;}

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge.pending { background: #334155; color: #cbd5e1; }
        .badge.processing { background: #1e3a8a; color: #93c5fd; }
        .badge.completed { background: #14532d; color: #86efac; }
        .badge.cancelled { background: #7f1d1d; color: #fca5a5; }
        .badge.failed { background: #7f1d1d; color: #fca5a5; }
        
        .action-btn {
            padding: 6px 12px; font-size: 12px; border-radius: 6px; 
            display: inline-block; cursor: pointer; color: white;
            border: none; width: auto; font-weight: 500; margin-right: 4px;
        }
        .cancel-btn { background: #ef4444; }
        .cancel-btn:hover { background: #dc2626; }
        .purge-btn { background: #475569; }
        .purge-btn:hover { background: #334155; }

        .error-text { color: #fca5a5; font-size: 11px; margin-top: 4px; border-left: 2px solid #ef4444; padding-left: 6px; }

        #dashboard { display: none; }
        #errorMsg { color: var(--error); display: none; margin-bottom: 15px; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: transparent; border: 1px solid var(--border); width: auto; padding: 8px 16px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginBox" class="login-box">
        <h1>Admin Security</h1>
        <p style="color: #94a3b8; margin-bottom: 30px;">Authenticate to manage workers and jobs.</p>
        <div id="errorMsg"></div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required autocomplete="username">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit">Secure Login</button>
        </form>
    </div>

    <div id="dashboard">
        <div class="header-row">
            <h1>System Overview</h1>
            <div style="display: flex;">
                <button class="logout-btn" onclick="logout()">Logout</button>
                <button class="logout-btn" onclick="loadData()" style="margin-left: 8px; background: var(--primary); border:none;">Refresh Data</button>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Total Lifetime Jobs</h3>
                <p id="m-total">0</p>
            </div>
            <div class="metric-card">
                <h3>Active Network Nodes</h3>
                <p id="m-active" style="color: #38bdf8;">0</p>
            </div>
            <div class="metric-card">
                <h3>Resolved Workflows</h3>
                <p id="m-finished" style="color: #10b981;">0</p>
            </div>
        </div>

        <table id="jobsTable">
            <thead>
                <tr>
                    <th>Hash ID</th>
                    <th>Target Extraction Media</th>
                    <th>Status</th>
                    <th>Timestamp (UTC)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    async function checkAuth() {
        try {
            const res = await fetch('/api/v1/admin/jobs');
            if (res.ok) {
                const jobs = await res.json();
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderJobs(jobs);
                fetchMetrics(); // load metrics asynchronously to not block the table render
            } else {
                document.getElementById('loginBox').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function fetchMetrics() {
        try {
            const res = await fetch('/api/v1/admin/metrics');
            if (res.ok) {
                const m = await res.json();
                document.getElementById('m-total').innerText = m.total;
                document.getElementById('m-active').innerText = m.active;
                document.getElementById('m-finished').innerText = m.finished;
            }
        } catch(e) {}
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        
        const fd = new FormData();
        fd.append("username", u);
        fd.append("password", p);

        const res = await fetch('/api/v1/admin/login', { method: 'POST', body: fd });
        if (res.ok) {
            document.getElementById('errorMsg').style.display = 'none';
            checkAuth();
        } else {
            document.getElementById('errorMsg').innerText = "❌ Invalid Credentials";
            document.getElementById('errorMsg').style.display = 'block';
        }
    });

    async function logout() {
        await fetch('/api/v1/admin/logout', { method: 'POST' });
        checkAuth();
    }

    async function loadData() {
        checkAuth();
    }

    function renderJobs(jobs) {
        const tbody = document.querySelector('#jobsTable tbody');
        tbody.innerHTML = '';
        jobs.forEach(j => {
            const tr = document.createElement('tr');
            
            // Format URL and Title
            let urlDisp = "";
            if (j.title && j.title !== "None") {
                urlDisp = `<strong style="color:white; font-size:14px;">${j.title}</strong><br><span style="font-size:12px;color:#94a3b8">${j.url}</span>`;
            } else {
                urlDisp = `<span style="font-size:12px">${j.url}</span>`;
            }

            // Append Error if exists
            if (j.error_message && j.error_message !== "None") {
                urlDisp += `<div class="error-text">Engine Error: ${j.error_message}</div>`;
            }
            
            let actionBtn = "";
            let purgeBtn = `<button class="action-btn purge-btn" onclick="purgeJob('${j.id}')">Purge DB</button>`;

            if (["pending", "processing", "uploading"].includes(j.status)) {
                actionBtn = `<button class="action-btn cancel-btn" onclick="cancelJob('${j.id}')">SIGKILL</button>`;
                purgeBtn = ""; // dont allow purging active jobs to prevent orphan ghost workers
            }

            tr.innerHTML = `
                <td style="font-size: 11px; color:#64748b; vertical-align:top;">${j.id.split('-')[0]}</td>
                <td style="vertical-align:top; max-width: 400px; word-wrap: break-word;">${urlDisp}</td>
                <td style="vertical-align:top;"><span class="badge ${j.status}">${j.status.toUpperCase()}</span></td>
                <td style="font-size: 12px; color:#94a3b8; vertical-align:top;">${new Date(j.created_at).toLocaleString()}</td>
                <td style="vertical-align:top; white-space: nowrap;">${actionBtn}${purgeBtn}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function cancelJob(id) {
        if (confirm("Are you sure you want to send a SIGKILL to this worker?")) {
            await fetch(`/api/v1/jobs/${id}`, { method: 'DELETE' });
            loadData();
        }
    }

    async function purgeJob(id) {
        if (confirm("Permanently delete this job history from the database?")) {
            await fetch(`/api/v1/admin/jobs/${id}/purge`, { method: 'DELETE' });
            loadData();
        }
    }
</script>
</body>
</html>
