<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Media Downloader Control Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --container-bg: rgba(15, 23, 42, 0.6);
            --primary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            background: var(--container-bg);
            backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 1200px;
        }
        h1 { margin-top: 0; font-weight: 800; font-size: 32px; letter-spacing: -0.5px;}
        .subtitle { color: var(--text-muted); margin-top: -10px; margin-bottom: 30px; font-weight: 400; }
        
        .login-box { max-width: 400px; margin: 0 auto; text-align: center; }
        input[type="text"], input[type="password"], select {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-main); font-family: 'Outfit';
            box-sizing: border-box; outline: none; transition: border 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); }

        button {
            padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; font-weight: bold; cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        
        /* Dashboard Layout */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .metric-card h3 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 14px; text-transform: uppercase; }
        .metric-card p { margin: 0; font-size: 32px; font-weight: 800; color: var(--text-main); }
        
        /* Toolbars */
        .toolbar {
            display: flex; gap: 15px; margin-bottom: 20px; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; border: 1px solid var(--border);
        }
        .toolbar-group { display: flex; gap: 10px; align-items: center; }

        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        
        .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 8px; }
        
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; letter-spacing: 0.5px;}
        .badge.pending { background: #334155; color: #cbd5e1; }
        .badge.processing, .badge.uploading { background: #1e3a8a; color: #93c5fd; }
        .badge.completed { background: #14532d; color: #86efac; }
        .badge.cancelled { background: #7f1d1d; color: #fca5a5; }
        .badge.failed { background: #7f1d1d; color: #fca5a5; }
        
        .action-btn {
            padding: 6px 12px; font-size: 12px; border-radius: 6px; 
            display: inline-block; cursor: pointer; color: white;
            border: none; width: auto; font-weight: 500; margin-right: 4px;
        }
        .cancel-btn { background: #ef4444; }
        .cancel-btn:hover { background: #dc2626; }
        .purge-btn { background: #475569; }
        .purge-btn:hover { background: #334155; }

        .error-text { color: #fca5a5; font-size: 11px; margin-top: 4px; border-left: 2px solid #ef4444; padding-left: 6px; }

        #dashboard { display: none; }
        #errorMsg { color: var(--error); display: none; margin-bottom: 15px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginBox" class="login-box">
        <h1>Control Matrix</h1>
        <p class="subtitle">Global Media Downloader Auth</p>
        <div id="errorMsg"></div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required autocomplete="username" style="margin-bottom: 15px;">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password" style="margin-bottom: 15px;">
            <button type="submit" style="width: 100%;">Initialize Secure Uplink</button>
        </form>
    </div>

    <div id="dashboard">
        <div class="header-row">
            <div>
                <h1>Global Control Matrix</h1>
                <p class="subtitle">Media Downloader Administration Engine</p>
            </div>
            <div style="display: flex;">
                <button class="btn-outline btn-sm" onclick="logout()">Logout</button>
                <button class="btn-sm" onclick="loadData()" style="margin-left: 8px; background: var(--primary);">Refresh Live Data</button>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Total Processed Jobs</h3>
                <p id="m-total">0</p>
            </div>
            <div class="metric-card">
                <h3>Active Network Nodes</h3>
                <p id="m-active" style="color: #38bdf8;">0</p>
            </div>
            <div class="metric-card">
                <h3>Resolved / Failed</h3>
                <p id="m-finished" style="color: #10b981;">0</p>
            </div>
        </div>

        <!-- Master Toolbar -->
        <div class="toolbar">
            <div class="toolbar-group" style="flex-grow: 1;">
                <input type="text" id="searchInput" placeholder="Search by Job ID, URL, or Title..." onkeyup="filterTable()" style="max-width: 300px; padding: 10px;">
                <select id="statusFilter" onchange="filterTable()" style="max-width: 150px; padding: 10px;">
                    <option value="all">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="completed">Completed</option>
                    <option value="failed">Failed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            
            <div class="toolbar-group">
                <button class="btn-sm btn-outline" style="background: #2563eb;" onclick="exportJSON()">JSON</button>
                <button class="btn-sm btn-outline" style="background: #16a34a;" onclick="exportCSV()">CSV</button>
                <button class="btn-sm btn-outline" style="background: #dc2626;" onclick="exportPDF()">PDF</button>
                
                <span style="color: var(--border);">|</span>
                
                <button class="btn-sm btn-danger" onclick="massPurgeFailed()">Purge Failed</button>
                <button class="btn-sm btn-danger" onclick="massCancelActive()">Halt Active</button>
            </div>
        </div>

        <table id="jobsTable">
            <thead>
                <tr>
                    <th>Hash ID</th>
                    <th>Target Extraction Media</th>
                    <th>Status</th>
                    <th>Timestamp (UTC)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let globalJobsData = [];

    async function checkAuth() {
        try {
            const res = await fetch('/api/v1/admin/jobs');
            if (res.ok) {
                globalJobsData = await res.json();
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderJobs(globalJobsData);
                fetchMetrics();
            } else {
                document.getElementById('loginBox').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
            }
        } catch (e) { console.error(e); }
    }

    async function fetchMetrics() {
        try {
            const res = await fetch('/api/v1/admin/metrics');
            if (res.ok) {
                const m = await res.json();
                document.getElementById('m-total').innerText = m.total;
                document.getElementById('m-active').innerText = m.active;
                document.getElementById('m-finished').innerText = m.finished;
            }
        } catch(e) {}
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData();
        fd.append("username", document.getElementById('username').value);
        fd.append("password", document.getElementById('password').value);

        const res = await fetch('/api/v1/admin/login', { method: 'POST', body: fd });
        if (res.ok) {
            document.getElementById('errorMsg').style.display = 'none';
            checkAuth();
        } else {
            document.getElementById('errorMsg').innerText = "❌ Neural handshake failed. Invalid clearance.";
            document.getElementById('errorMsg').style.display = 'block';
        }
    });

    async function logout() { await fetch('/api/v1/admin/logout', { method: 'POST' }); checkAuth(); }
    async function loadData() { checkAuth(); }

    function renderJobs(jobs) {
        const tbody = document.querySelector('#jobsTable tbody');
        tbody.innerHTML = '';
        jobs.forEach(j => {
            const tr = document.createElement('tr');
            
            let urlDisp = "";
            if (j.title && j.title !== "None") {
                urlDisp = `<strong style="color:white; font-size:14px;">${j.title}</strong><br><span style="font-size:12px;color:#94a3b8">${j.url}</span>`;
            } else {
                urlDisp = `<span style="font-size:12px">${j.url}</span>`;
            }

            if (j.error_message && j.error_message !== "None") {
                urlDisp += `<div class="error-text">Engine Error: ${j.error_message}</div>`;
            }
            
            let actionBtn = "";
            let purgeBtn = `<button class="action-btn purge-btn" onclick="purgeJob('${j.id}')">Erase</button>`;

            if (["pending", "processing", "uploading"].includes(j.status)) {
                actionBtn = `<button class="action-btn cancel-btn" onclick="cancelJob('${j.id}')">SIGKILL</button>`;
                purgeBtn = ""; 
            }

            tr.innerHTML = `
                <td style="font-size: 11px; color:#64748b; vertical-align:top;">${j.id.split('-')[0]}</td>
                <td style="vertical-align:top; max-width: 400px; word-wrap: break-word;">${urlDisp}</td>
                <td style="vertical-align:top;"><span class="badge ${j.status}">${j.status.toUpperCase()}</span></td>
                <td style="font-size: 12px; color:#94a3b8; vertical-align:top;">${new Date(j.created_at).toLocaleString()}</td>
                <td style="vertical-align:top; white-space: nowrap;">${actionBtn}${purgeBtn}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function filterTable() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const stat = document.getElementById('statusFilter').value.toLowerCase();
        
        const filtered = globalJobsData.filter(j => {
            let matchSearch = j.id.toLowerCase().includes(term) || j.url.toLowerCase().includes(term);
            if (j.title) matchSearch = matchSearch || j.title.toLowerCase().includes(term);
            let matchStat = (stat === 'all') || (j.status === stat);
            return matchSearch && matchStat;
        });
        
        renderJobs(filtered);
    }

    async function cancelJob(id) {
        if (confirm("Send SIGKILL signal to this individual worker?")) {
            await fetch(`/api/v1/jobs/${id}`, { method: 'DELETE' });
            loadData();
        }
    }

    async function purgeJob(id) {
        if (confirm("Permanently erase this job from the database?")) {
            await fetch(`/api/v1/admin/jobs/${id}/purge`, { method: 'DELETE' });
            loadData();
        }
    }

    /* MASS ACTIONS */
    async function massPurgeFailed() {
        if (confirm("WARNING: This will permanently delete ALL FAILED and CANCELLED jobs from the database. Proceed?")) {
            await fetch('/api/v1/admin/jobs/purge-failed', { method: 'DELETE' });
            loadData();
        }
    }

    async function massCancelActive() {
        if (confirm("CRITICAL WARNING: This sends a global SIGKILL to ALL currently active workers. Disconnect all nodes now?")) {
            await fetch('/api/v1/admin/jobs/cancel-active', { method: 'POST' });
            loadData();
        }
    }

    /* EXPORT UTILS */
    function exportJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(globalJobsData, null, 2));
        const dn = document.createElement('a'); dn.href = dataStr; dn.download = "media_downloader_jobs.json"; dn.click();
    }

    function exportCSV() {
        let csv = "ID,URL,Title,Status,Created At, Error\n";
        globalJobsData.forEach(j => {
            let title = j.title ? j.title.replace(/,/g, "") : "";
            let err = j.error_message ? j.error_message.replace(/,/g, "") : "";
            csv += `${j.id},${j.url},${title},${j.status},${j.created_at},${err}\n`;
        });
        const dataStr = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
        const dn = document.createElement('a'); dn.href = dataStr; dn.download = "media_downloader_jobs.csv"; dn.click();
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape'); // Landscape to fit long YouTube URLs
        
        doc.setFontSize(18);
        doc.text("Media Downloader - Global Incident Report", 14, 22);
        doc.setFontSize(11);
        doc.setTextColor(100);
        doc.text("Generated: " + new Date().toLocaleString(), 14, 30);

        const tableColumn = ["Hash ID", "Media Title", "Target URL", "Status", "Timestamp"];
        const tableRows = [];

        globalJobsData.forEach(j => {
            const rowData = [
                j.id.split('-')[0], 
                j.title && j.title !== "None" ? j.title.substring(0,45) + '...' : 'Unknown/Processing', 
                j.url,
                j.status.toUpperCase(),
                new Date(j.created_at).toLocaleDateString()
            ];
            tableRows.push(rowData);
        });

        doc.autoTable({
            head: [tableColumn],
            body: tableRows,
            startY: 35,
            theme: 'grid',
            styles: { fontSize: 8, font: 'helvetica', overflow: 'linebreak' },
            columnStyles: {
                0: { cellWidth: 20 },
                1: { cellWidth: 60 },
                2: { cellWidth: 'auto' }, // URL dynamically auto-fits
                3: { cellWidth: 25 },
                4: { cellWidth: 25 }
            },
            headStyles: { fillColor: [139, 92, 246] }
        });

        doc.save("media_downloader_report.pdf");
    }

    checkAuth();
</script>
</body>
</html>
